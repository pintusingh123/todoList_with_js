<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
     <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="./index.js" defer></script>
</head>

<body>
    <div class="h-screen  grid md:grid-cols-2 gap-2 ">
        <!-- left div start -->
        <div class="h-screen">
            <img class="h-full   " src="./imgs/todo-2.avif" alt="not found img">
        </div>
        <!-- left div end -->
        <!-- right div start -->
        <div class=" py-2 px-5    ">
            <!-- div for heading  -->
            <div class="  w-11/12 mx-auto  flex py-5 flex-col  justify-center items-center ">
                <div class="w-16   h-16 bg-blue-100 flex items-center justify-center rounded-full mx-auto mb-4">
                    <i class="ri-mail-ai-fill text-3xl text-blue-600"></i>
                </div>

                <!-- Title -->
                <h1 class="text-3xl font-bold text-blue-700">
                    <span class="text-black">Task</span>Added
                </h1>

                <!-- Description -->
                <p class="text-gray-500 mb-6">
                    <span class="text-blue-600 font-semibold">Welcome.</span> to todo App .... add daily routine task
                    here
                </p>
            </div>
            <!-- div for tast added operation  -->

            <!-- start form for added task in table  -->
            <div class="w-12/12 flex gap-3 mx-auto mb-6">
                <!-- Input -->
                <input oninput="filter(this)"
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400 transition"
                    type="text" name="task" id="task" placeholder="Search your task...">

                <!-- Button -->
                <button onclick="OpenPopUP()"
                    class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition font-medium flex items-center gap-1">
                    <i class="ri-add-line"></i>New Task
                </button>



            </div>
            <!-- end form here -->

            <!-- start table div here=> -->
            <div class="bg-white w-full mx-auto rounded-lg shadow-md overflow-hidden">

                <!-- table scroll container -->
                <div class="max-h-[300px] overflow-y-auto">

                    <table class="w-full text-left border-collapse">

                        <!-- Table Head -->
                        <thead class="bg-gray-900 text-white sticky top-0">
                            <tr>
                                <th class="p-3 text-sm font-semibold">SN</th>
                                <th class="p-3 text-sm font-semibold">TASK</th>
                                <th class="p-3 text-sm font-semibold">Date</th>
                                <th class="p-3 text-sm font-semibold">Status</th>
                                <th class="p-3 text-sm font-semibold text-center">ACTIONS</th>
                            </tr>
                        </thead>

                        <!-- Table Body -->
                        <tbody id="taskContainer" class="text-gray-700">
                            <!-- we added task here dynamicly -->
                        </tbody>

                    </table>

                </div>
            </div>
        </div>

    </div>

</body>

</html>
